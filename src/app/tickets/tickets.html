<div class="container-fluid tickets">
  <div class="title text-center">
    <h2 class="tickets-subtitle">Áraink</h2>
    <h1 class="tickets-title">Bérletek és jegyek</h1>
    <p class="tickets-description">
      Az alábbi táblázatban találhatók a különböző bérletek és jegyek árai, valamint érvényességi
      idejük.
    </p>
  </div>
  <div class="ticket-table">
    <table>
      <thead>
        <tr>
          <th>Megnevezés</th>
          <th>Bérlet ára</th>
          <th>Vásárlás</th>
        </tr>
      </thead>
      <tbody>
        @for (ticket of this.tickets; track $index) {
          <tr>
            <td>{{ticket.ticketName}}</td>
            <td>{{ticket.price}} Ft</td>
            <td>
              <button (click)="purchaseTicket(ticket.id)"><i class="fa-solid fa-cart-shopping"></i></button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</div>
