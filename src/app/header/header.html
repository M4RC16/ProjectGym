<nav class="navbar navbar-expand-lg fixed-top navbar-custom">
  <div class="container">
    <a class="navbar-brand" routerLink="/">
      <img src="/assets/logo.svg" alt="A weboldal logója" class="logo" />
    </a>

    <span class="brand-name d-lg-none">ProjectGym</span>

    <button
      class="navbar-toggler"
      type="button"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Menü"
    >
      <span class="toggler-icon">
        <i class="fa-solid" [class.fa-bars]="!menuOpen()" [class.fa-xmark]="menuOpen()"></i>
      </span>
    </button>

    <div class="collapse navbar-collapse" [class.show]="menuOpen()">
      <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" (click)="closeMenu()">Kezdőlap</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/gallery" (click)="closeMenu()">Galéria</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/tickets" (click)="closeMenu()">Bérlet árak</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/trainers" (click)="closeMenu()">Edzőink</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/contact-us" (click)="closeMenu()">Kapcsolat</a>
        </li>
      </ul>

      <div class="auth-buttons d-flex align-items-center">
        @if (currentUser()) {
          <a routerLink="/profil" class="profile-icon" title="Profil" (click)="closeMenu()">
            <i class="fa-solid fa-user"></i>
          </a>
        } @else {
          <button class="registerButton" routerLink="/register" (click)="closeMenu()">Regisztráció</button>
          <button class="loginButton" routerLink="/login" (click)="closeMenu()">Bejelentkezés</button>
        }
      </div>
    </div>
  </div>
</nav>
