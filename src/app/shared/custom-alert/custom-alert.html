@if (alertService.alert(); as alert) {
  <div class="alert-overlay" (click)="alertService.dismiss()">
    <div class="alert-box" [class.success]="alert.type === 'success'" [class.error]="alert.type === 'error'" (click)="$event.stopPropagation()">
      <div class="alert-icon">
        @if (alert.type === 'success') {
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
        }
      </div>
      <p class="alert-message">{{ alert.message }}</p>
      <button class="alert-close" (click)="alertService.dismiss()">OK</button>
    </div>
  </div>
}
