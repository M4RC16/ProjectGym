<article
  class="trainer-card"
  role="button"
  tabindex="0"
  (click)="onOpenProfile()"
  (keydown.enter)="onOpenProfile()"
  (keydown.space)="onOpenProfile()"
>
  <img
    [src]="trainer.profilePicture || fallbackImage"
    [alt]="trainer.trainerName"
    (error)="onImageError($event)"
  />

  <div class="trainer-content">
    <h3>{{ trainer.trainerName }}</h3>
    <button type="button" class="details-btn" (click)="$event.stopPropagation(); onOpenProfile()">
      Profil megtekintése
    </button>
  </div>
</article>
