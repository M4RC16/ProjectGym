<div class="title text-center">
  <h2 class="trainers-subtitle">Csapatunk</h2>
  <h1 class="trainers-title">Edzőink</h1>
  <p class="trainers-description">
    Ismerje meg tapasztalt és elkötelezett edzőinket, akik segítenek elérni céljait!
  </p>
</div>

<div class="container trainers-container">
    <div class="row justify-content-center gy-4 gy-md-5">
        @for (trainer of trainers; track trainer) {
            <div class="trainer col-6 col-sm-6 col-md-4 col-lg-3">
                <app-trainer-card [trainer]="trainer" />
            </div>
        }
    </div>
</div>
