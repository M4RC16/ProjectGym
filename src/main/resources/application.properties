spring.application.name=forevergym

#ird at ha valami error van ->
server.error.include-stacktrace=always

# adatbazis kapcsolat
spring.datasource.url=jdbc:mysql://localhost:3306/projectgym_local
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# jwt and refresh token
jwt.secret=${jwt_secret}
jwt.expiration=900000

jwt.refresh.expiration=604800000

# Email
spring.mail.host=smtp.eu.mailgun.org
spring.mail.port=2525
spring.mail.username=***REMOVED***
spring.mail.password=${smpass}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

#Stripe
STRIPE_SECRET_KEY=${sskey}
STRIPE_PUBLIC_KEY=${spkey}

# hova menti a kťpeket
file.upload-dir=uploads/images
